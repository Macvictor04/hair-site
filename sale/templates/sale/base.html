<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROWN | Luxury Raw Hair</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- VARIABLES & RESET --- */
        :root { 
            --gold: #c5a059; 
            --dark: #121212; 
            --light: #f4f4f4; 
            --gray: #1a1a1a; 
            --spacing: 8%;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--light); line-height: 1.6; overflow-x: hidden; }

        /* --- LAYOUT CONTAINERS --- */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* --- NAVIGATION --- */
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 1.5rem var(--spacing); 
            background: rgba(0,0,0,0.95); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid #222; 
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); text-decoration: none; }
        .nav-links { display: flex; list-style: none; gap: 2rem; align-items: center; }
        .nav-links a { color: var(--light); text-decoration: none; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }
        .contact-btn { border: 1px solid var(--gold); padding: 8px 15px; }

        /* --- PRODUCT GRID (Small Layout) --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 250px));
            gap: 30px;
            justify-content: center;
            padding: 40px 0;
        }
        .product-card { background: var(--gray); padding: 15px; border: 1px solid #222; transition: 0.3s; }
        .product-img { width: 100%; height: 280px; object-fit: cover; }

        /* --- PRODUCT DETAIL --- */
        .detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            padding: 60px 0;
        }

        /* --- COMPONENTS --- */
        .cta-button { display: inline-block; background: var(--gold); color: white; padding: 10px 25px; text-decoration: none; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; border: none; cursor: pointer; }
        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; z-index: 1000; text-decoration: none; }
        .social-icons { display: flex; gap: 20px; margin-top: 15px; }
        .social-icons a { color: var(--light); font-size: 1.5rem; transition: 0.3s; text-decoration: none; }
        .social-icons a:hover { color: var(--gold); }

        /* --- FOOTER --- */
        footer { padding: 60px var(--spacing); background: #000; border-top: 1px solid var(--gray); margin-top: 50px; }
        .footer-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; }

        /* --- MEDIA QUERIES --- */
        @media (max-width: 1024px) {
            .container { max-width: 900px; }
        }

        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 15px; padding: 1rem; }
            .container { padding: 0 20px; }
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .product-img { height: 180px; }
            .detail-container { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- WhatsApp Button -->
    <a href="https://wa.me/YOURNUMBER" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Header Navigation -->
    <nav>
        <a href="/" class="logo">Crown</a>
        <ul class="nav-links">
            <li><a href="{% url 'products' %}">Shop All</a></li>
            <li><a href="#">Lace</a></li>
            <li><a href="#">Bundles</a></li>
            <li><a href="#" class="contact-btn">Contact Us</a></li>
        </ul>
    </nav>

    <!-- Main Content Block -->
    <main>
        {% block content %}
        {% endblock content %}
    </main>

    <!-- Footer Section -->
    <footer>
        <div class="footer-content">
            <div>
                <h3 class="logo">Crown</h3>
                <p style="font-size: 0.8rem; color: #777; margin-top: 10px;">Ethically sourced raw hair.</p>
            </div>
            <div>
                <h4 style="color: var(--gold); margin-bottom: 15px;">Follow Us</h4>
                <div class="social-icons">
                    <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="#" target="_blank"><i class="fab fa-tiktok"></i></a>
                    <a href="#" target="_blank"><i class="fab fa-facebook-square"></i></a>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
