{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Valentino Hair{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* =========================
           GLOBAL STYLES
        ==========================*/
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
        }
        html {
            scroll-behavior: smooth;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* =========================
           NAVBAR
        ==========================*/
        .navbar {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 40px; 
            background: white; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 50%;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            position: relative;   
            text-decoration: none;
            color: black;
            margin-left: 20px;
            font-weight: 500;
        }

        .nav-links a::after { 
        content: ""; 
        position: absolute; 
        left: 0; 
        bottom: -5px; 
        width: 0%; 
        height: 2px; 
        background: black; 
        transition: width 0.3s ease; 
      } 
        /* show line on hover */ 
        .nav-links a:hover::after { 
            width: 100%; 
        }
        

        /* =========================
           PAGE CONTENT AREA
        ==========================*/
        .content {
            padding: 40px;
        }
        .socials a {
            margin-top: 20px;
            font-size: 22px;
           color: white;
           margin: 0 10px;
           transition: 0.3s;
       }

       .socials a:hover {
           transform: scale(1.2);
           color: #ff4d6d;
       }

        /* =========================
           FOOTER (optional later)
        ==========================*/
        .footer {
            text-align: center;
            padding: 20px;
            background-color: #111;
            color: white;
            margin-top: 50px;
        }
       .menu-toggle {
         display: none;
         font-size: 28px;
         cursor: pointer;
       }  

    /* =========================
   MOBILE VIEW
=========================*/
    @media (max-width: 768px) {

    .menu-toggle {
        display: block;
    }

    .nav-links {
        display: none;
        position: absolute;
        top: 70px;
        right: 20px;
        flex-direction: column;
        background: white;
        width: 200px;
        padding: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        border-radius: 10px;
    }

    .nav-links.active {
        display: flex;
    }
}

    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- NAVBAR (fixed structure) -->
    <div class="navbar">
        <div class="logo">
            <img src="{% static 'images/logo.png' %}" alt="logo">
            <strong>Valentino Hair</strong>
        </div>

        <div class="menu-toggle" onclick="toggleMenu()">
        ☰
        </div>
        

        <div class="nav-links" id="navLinks">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'products' %}">Products</a>
            <a href="#contact">Contact</a>
        </div>
    </div>

    <!-- PAGE CONTENT WILL CHANGE HERE -->
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

    <!-- OPTIONAL FOOTER -->
    <div class="footer">
        © 2026 Valentino Hair. All rights reserved.
        <div class="socials">
    <a href="https://instagram.com/yourpage" target="_blank">
        <i class="fab fa-instagram"></i>
    </a>

    <a href="https://tiktok.com/@yourpage" target="_blank">
        <i class="fab fa-tiktok"></i>
    </a>

    <a href="https://wa.me/234XXXXXXXXXX" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <a href="https://facebook.com/yourpage" target="_blank">
        <i class="fab fa-facebook"></i>
    </a>
</div>
    </div>
    <script>
    function toggleMenu() {
    const nav = document.getElementById("navLinks");
    nav.classList.toggle("active");
    }
   </script>
</body>
</html>
