<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROWN | Luxury Raw Hair</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Updated Font Awesome Link for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #c5a059; --dark: #121212; --light: #f4f4f4; --gray: #1a1a1a; --spacing: 8%; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--light); line-height: 1.6; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 300px));
            gap: 30px;
        }
        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem var(--spacing); background: rgba(0,0,0,0.95); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); text-decoration: none; }
        .nav-links { display: flex; list-style: none; gap: 2rem; align-items: center; }
        .nav-links a { color: var(--light); text-decoration: none; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }
        .contact-btn { border: 1px solid var(--gold); padding: 8px 15px; }

        /* Floating WhatsApp */
        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; z-index: 1000; text-decoration: none; }

        /* Footer & Socials */
        footer { padding: 60px var(--spacing); background: #000; border-top: 1px solid var(--gray); margin-top: 50px; }
        .footer-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; }
        .social-icons { display: flex; gap: 20px; margin-top: 15px; }
        .social-icons a { color: var(--light); font-size: 1.5rem; transition: 0.3s; text-decoration: none; }
        .social-icons a i { display: inline-block; } /* Ensures icon renders */
        .social-icons a:hover { color: var(--gold); }

        /* Common Components */
        .section-title { font-family: 'Playfair Display', serif; font-size: 2rem; text-align: center; margin-bottom: 40px; }
        .cta-button { display: inline-block; background: var(--gold); color: white; padding: 10px 25px; text-decoration: none; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <a href="https://wa.me/YOURNUMBER" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <nav>
        <a href="/" class="logo">Crown</a>
        <ul class="nav-links">
            <li><a href="{% url 'products' %}">Shop All</a></li>
            <li><a href="#">Lace</a></li>
            <li><a href="#">Bundles</a></li>
            <li><a href="#" class="contact-btn">Contact Us</a></li>
        </ul>
    </nav>

    <!-- THE BODY CONTENT GOES HERE -->
    {% block content %}
    {% endblock content %}

    <footer>
        <div class="footer-content">
            <div>
                <h3 class="logo">Crown</h3>
                <p style="font-size: 0.8rem; color: #777; margin-top: 10px;">Ethically sourced raw hair.</p>
            </div>
            <div>
                <h4 style="color: var(--gold); margin-bottom: 15px;">Follow Us</h4>
                <div class="social-icons">
                    <!-- Added full i tags to ensure they show -->
                    <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://tiktok.com" target="_blank"><i class="fab fa-tiktok"></i></a>
                    <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook-square"></i></a>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
